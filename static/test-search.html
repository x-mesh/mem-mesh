<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page Test</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-header {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .test-controls {
            margin-bottom: 20px;
        }
        .test-controls button {
            margin: 5px;
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .test-controls button:hover {
            background: #f0f0f0;
        }
        #search-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>🔍 Search Page Test</h1>
            <p>이 페이지는 search 페이지 컴포넌트를 독립적으로 테스트합니다.</p>
        </div>
        
        <div class="test-controls">
            <button onclick="initializeApp()">Initialize App</button>
            <button onclick="testDirectSearch()">Test Direct Search</button>
            <button onclick="testRegularSearch()">Test Regular Search</button>
            <button onclick="clearConsole()">Clear Console</button>
        </div>
        
        <div id="search-container">
            <!-- Search component will be inserted here -->
        </div>
    </div>

    <script type="module">
        import { APIClient } from './js/services/api-client.js';
        import { SearchPage } from './js/pages/search.js';
        
        let searchPageInstance = null;
        
        // 전역 함수들
        window.initializeApp = function() {
            console.log('🚀 Initializing app...');
            
            if (!window.app) {
                window.app = {
                    apiClient: new APIClient()
                };
                console.log('✅ App initialized with API client');
            } else {
                console.log('ℹ️ App already initialized');
            }
        };
        
        window.testDirectSearch = async function() {
            console.log('🔍 Testing direct search...');
            
            try {
                // Search 페이지 컴포넌트 생성
                if (!searchPageInstance) {
                    searchPageInstance = document.createElement('search-page');
                    const container = document.getElementById('search-container');
                    container.innerHTML = '';
                    container.appendChild(searchPageInstance);
                    console.log('✅ Search page component created');
                }
                
                // Direct search 실행
                await searchPageInstance.performDirectSearch();
                console.log('✅ Direct search completed');
                
            } catch (error) {
                console.error('❌ Direct search test failed:', error);
            }
        };
        
        window.testRegularSearch = async function() {
            console.log('🔍 Testing regular search...');
            
            try {
                // 앱이 초기화되어 있는지 확인
                if (!window.app) {
                    console.log('⚠️ App not initialized, initializing first...');
                    window.initializeApp();
                }
                
                // Search 페이지 컴포넌트 생성
                if (!searchPageInstance) {
                    searchPageInstance = document.createElement('search-page');
                    const container = document.getElementById('search-container');
                    container.innerHTML = '';
                    container.appendChild(searchPageInstance);
                    console.log('✅ Search page component created');
                }
                
                // Regular search 실행
                await searchPageInstance.performSearch();
                console.log('✅ Regular search completed');
                
            } catch (error) {
                console.error('❌ Regular search test failed:', error);
            }
        };
        
        window.clearConsole = function() {
            console.clear();
            console.log('🧹 Console cleared');
        };
        
        // 페이지 로드 시 자동으로 search 컴포넌트 생성
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Page loaded, creating search component...');
            
            searchPageInstance = document.createElement('search-page');
            const container = document.getElementById('search-container');
            container.appendChild(searchPageInstance);
            
            console.log('✅ Search component added to page');
            console.log('💡 Use the buttons above to test different scenarios');
        });
    </script>
</body>
</html>
