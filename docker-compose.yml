services:
  # Production service
  mem-mesh:
    build:
      context: .
      dockerfile: Dockerfile
    image: mem-mesh:latest
    entrypoint: tail -f /dev/null
    container_name: mem-mesh-prod
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_PATH=/app/data/memories.db
      - LOG_LEVEL=INFO
      - MCP_LOG_FORMAT=text
      - MEM_MESH_SERVER_HOST=0.0.0.0
      - MEM_MESH_SERVER_PORT=8000
      - MEM_MESH_SERVER_WORKERS=2

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
