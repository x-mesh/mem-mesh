<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>mem-mesh Web UI</title>
  <meta name="description" content="Central memory server with vector search and context retrieval">
  
  <link rel="stylesheet" href="/static/css/main.css?v={{ version }}">
  <link rel="icon" href="/static/assets/favicon.ico" type="image/x-icon">
  
  <!-- Prism.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
  
  <!-- Chart.js for monitoring dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body data-version="{{ version }}">
  <div id="app">
    <!-- Chroma Header -->
    <chroma-header></chroma-header>
    
    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Loading state -->
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
      
      <!-- Dynamic content will be loaded here -->
      <div id="page-content" class="page-content hidden">
        <!-- Page content will be rendered here -->
      </div>
    </main>
    
    <!-- Sidebar (for filters, navigation) -->
    <aside id="sidebar" class="sidebar">
      <!-- Dynamic sidebar content -->
    </aside>
  </div>
  
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>
  
  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>
  
  <!-- Modal container -->
  <div id="modal-container" class="modal-container hidden"></div>
  
  <!-- Prism.js core and common languages -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  
  <script type="module" src="/static/js/main.js?v={{ version }}"></script>
</body>
</html>
