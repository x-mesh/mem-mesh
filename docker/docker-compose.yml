version: '3.8'

services:
  # FastAPI Dashboard + REST API
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: mem-mesh-dashboard
    ports:
      - "8000:8000"  # Web Dashboard + REST API
      - "8001:8001"  # MCP SSE endpoint
    volumes:
      - mem-mesh-data:/app/data
      - ../app:/app/app:ro  # Mount source for development (read-only)
      # templates/ and static/ moved under app/web/ in v1.4.0 — covered by /app/app mount
    environment:
      - MEM_MESH_DATABASE_PATH=/app/data/memories.db
      - MEM_MESH_STORAGE_MODE=direct
      - MEM_MESH_SERVER_HOST=0.0.0.0
      - MEM_MESH_SERVER_PORT=8000
      - MEM_MESH_LOG_LEVEL=info
      # Embedding: defaults to nlpai-lab/KURE-v1. Uncomment to override.
      # - MEM_MESH_EMBEDDING_MODEL=intfloat/multilingual-e5-large
      # - MEM_MESH_EMBEDDING_DIM=1024
      - MEM_MESH_BUSY_TIMEOUT=30000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mem-mesh-network

  # MCP stdio Server (for CLI usage)
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mem-mesh-mcp
    volumes:
      - mem-mesh-data:/app/data
      - ../app:/app/app:ro  # Mount source for development (read-only)
    environment:
      - MEM_MESH_DATABASE_PATH=/app/data/memories.db
      - MEM_MESH_STORAGE_MODE=direct
      - MEM_MESH_LOG_FORMAT=text
      # Embedding: defaults to nlpai-lab/KURE-v1.
      # - MEM_MESH_EMBEDDING_MODEL=intfloat/multilingual-e5-large
      - MEM_MESH_BUSY_TIMEOUT=30000
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - mem-mesh-network
    profiles:
      - mcp  # Only start when explicitly requested

volumes:
  mem-mesh-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}

networks:
  mem-mesh-network:
    driver: bridge
