services:
  mem-mesh-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: mem-mesh:dev
    container_name: mem-mesh-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/.hypothesis
      - model-cache:/home/memmesh/.cache/huggingface
    environment:
      - DATABASE_PATH=/app/data/memories.db
      - LOG_LEVEL=DEBUG
      - MCP_LOG_FORMAT=text
      - PYTHONUNBUFFERED=1
      - MEM_MESH_SERVER_HOST=0.0.0.0
      - MEM_MESH_SERVER_PORT=8000
      - MEM_MESH_SERVER_WORKERS=2

    stdin_open: true
    tty: true
    command: python -m app.web --reload

volumes:
  model-cache:
    name: mem-mesh-model-cache

networks:
  default:
    name: mem-mesh-network
